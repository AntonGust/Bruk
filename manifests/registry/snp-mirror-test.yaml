# Step-4 mirror-mechanism validation (plan): does a confidential guest with cc_init_data pull a tiny
# image via the LOCAL MIRROR instead of docker.io? Cheap bare-SNP guest (no GPU) — validates the
# initdata → registries.conf → image-rs mirror path BEFORE the expensive GPU-guest pull.
#
# Apply with the base64 injected from the initdata TOML (no hand-maintained blob):
#   B64=$(bash manifests/registry/build-initdata.sh)
#   sed "s|__INITDATA_B64__|$B64|" manifests/registry/snp-mirror-test.yaml | kubectl apply -f -
#
# Proof it used the mirror: after it starts, check the registry pod logs for a GET of
# library/busybox — `kubectl logs -l app=registry | grep busybox`. If the guest pulled from the mirror,
# the request shows up there; docker.io fallback would not.
#
# Image ref is a plain docker.io tag on purpose — the mirror MAPPING (prefix docker.io) is what must
# redirect it. Step-4 also tests a digest ref separately.
apiVersion: v1
kind: Pod
metadata:
  name: snp-mirror-test
  labels: { app: snp-mirror-test }
  annotations:
    io.katacontainers.config.hypervisor.cc_init_data: "__INITDATA_B64__"
spec:
  runtimeClassName: kata-qemu-snp        # confidential guest, no GPU (fast ~20s boot)
  restartPolicy: Never
  containers:
    - name: probe
      image: docker.io/library/busybox:1.36
      command: ["sleep", "600"]
      resources:
        limits:   { memory: 2Gi, cpu: "2" }
        requests: { memory: 2Gi, cpu: "1" }
