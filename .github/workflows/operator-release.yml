# Release pipeline for the Airon Operator. Trigger: push a monorepo-namespaced
# tag `operator/vX.Y.Z`. Pushes ghcr.io/antongust/bruk-operator:vX.Y.Z and
# prints the image DIGEST to the job summary — that digest is what gets pinned
# in install/helm-values/airon-operator.yaml (deployment is always by digest).
name: operator-release

on:
  push:
    tags:
      - 'operator/v*'

permissions:
  contents: read

jobs:
  release-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#operator/}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: operator
          push: true
          tags: ghcr.io/antongust/bruk-operator:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Emit digest to job summary
        # Pass the tag-derived version and build digest through env, never
        # interpolated into the shell: ${{ }} substitution happens before the
        # script runs, so a crafted tag name would otherwise inject commands.
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## bruk-operator ${VERSION}"
            echo ""
            echo "Image: \`ghcr.io/antongust/bruk-operator:${VERSION}\`"
            echo "Digest: \`${DIGEST}\`"
            echo ""
            echo "Pin in install/helm-values/airon-operator.yaml as:"
            echo '```yaml'
            echo "controllerManager:"
            echo "  container:"
            echo "    image:"
            echo "      repository: ghcr.io/antongust/bruk-operator"
            echo "      tag: \"${VERSION}@${DIGEST}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
