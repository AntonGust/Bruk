# Airon Operator (Phase 3.2, ADR-0002) — SUSPENDED until cluster rollout.
#
# GATE: spec.suspend=true. The object lands in-cluster (visible via
# `flux get helmreleases -n flux-system`) but helm-controller never reconciles
# it: no chart fetch, no install, no namespace, no pods. INERTNESS CONTRACT:
# committing this file must change nothing observable except the HelmRelease
# object itself; the ghcr-pull secret is NOT required while suspended.
#
# UNSUSPEND CHECKLIST (a follow-up phase, one reviewed commit flipping suspend):
#   1. Release the image (tag operator/vX.Y.Z) and confirm the GHCR package
#      ghcr.io/antongust/bruk-operator is PUBLIC + repo-linked (ADR-0008) — no
#      pull secret is needed. (Workload/model secrets like hf-token stay private.)
#   2. install/helm-values/airon-operator.yaml pins the released image BY DIGEST.
#   3. Flip suspend below to false, commit, `flux reconcile ks bruk-helm`.
#   (install.createNamespace below makes the target namespace; no manual step.)
#
# Chart comes from the EXISTING `bruk` GitRepository (read-only deploy key — no new sources or
# credentials). reconcileStrategy is left DEFAULT (ChartVersion): the chart's helm.sh/chart label
# stamps the raw .Chart.Version, and Revision strategy appends "+<git-sha>" — a "+" is invalid in a
# k8s label value, so server-side apply rejects every object (install fails). With ChartVersion the
# version stays "0.1.0" (valid). Trade-off: bump operator/dist/chart Chart.yaml to ship template
# edits (values changes still upgrade via valuesFrom regardless).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airon-operator
  namespace: flux-system
spec:
  suspend: false # UNSUSPENDED (v0.1.0, digest-pinned). ⚠️ merge only AFTER the GHCR package is PUBLIC (checklist step 1), else the manager pod ImagePullBackOffs.
  interval: 30m
  releaseName: airon-operator
  targetNamespace: airon-operator-system
  storageNamespace: airon-operator-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./operator/dist/chart
      sourceRef: { kind: GitRepository, name: bruk }
  valuesFrom:
    - { kind: ConfigMap, name: airon-operator-values, valuesKey: airon-operator.yaml }
