# Flux entry point for the confidential app layer (gitops/apps/cluster.yaml points here).
# Explicit resource list — the other files in this directory are either legacy/non-CC
# (day4-vllm.yaml, h100-vllm.yaml), managed separately (registry/), or manual probes
# (attestation/). The ${INITDATA_B64} placeholder (in bruk-tenant.yaml) is substituted post-build
# by the Flux Kustomization (gitops/apps/cluster.yaml holds the blob).
#
# Both CC workloads are now operator-driven: the BrukTenant + BrukModel + InferenceService CRs below
# replace the hand-written h100-vllm-cc-smoke.yaml (smoke) and h100-vllm-cc.yaml (24B), which the
# operator renders identically (both kept on disk as render golden-test references, intentionally
# NOT listed here).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - trusted-storage.yaml
  - bruk-tenant.yaml
  - bruk-smoke-workload.yaml
  - bruk-24b-workload.yaml
