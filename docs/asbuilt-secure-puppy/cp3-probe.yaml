apiVersion: v1
kind: Pod
metadata:
  name: cp3-probe
  namespace: default
spec:
  runtimeClassName: kata-qemu-nvidia-gpu
  restartPolicy: Never
  containers:
  - name: probe
    image: nvidia/cuda:12.4.1-base-ubuntu22.04
    command: ["bash","-lc","echo guest-kernel: $(uname -r); echo ---; nvidia-smi; sleep 3600"]
    resources:
      limits:
        nvidia.com/pgpu: 1
