# Confidential serving of the REAL model (Mistral-Small-3.1-24B FP8) — ADR-0006 Part 2.
#
# How the two storage walls are solved on the pinned stack (kata 3.29.0, guest-components de3f6ff):
#
#   WEIGHTS (the ~50GB HF download): a plain emptyDir. The SNP runtimes ship
#   `emptydir_mode = "block-encrypted"` — a non-Memory emptyDir becomes a sparse disk.img on the
#   host NVMe, hotplugged as virtio-scsi, dm-crypt(AEAD: hmac-sha256+aes-xts)-formatted INSIDE the
#   guest with an ephemeral guest key, ext4. Host sees ciphertext only. Verified on this box
#   2026-07-02 (bare SNP pod: /dev/mapper/<uuid> at the mountPoint, backing file in
#   /var/lib/kubelet/.../empty-dir/, 3.5T sparse). NOT persistent — weights re-download on pod
#   restart (accepted for the pilot; persistent secure volume = later, see ADR-0006).
#
#   IMAGE (~35GB unpacked): guest-pulled from the LOCAL MIRROR (ADR-0006 Part 1) onto
#   /dev/trusted_store — a volumeMode:Block PVC (manifests/trusted-storage.yaml) the kata-agent
#   LUKS2-formats in-guest (ephemeral key) and mounts over /run/kata-containers/image BEFORE the
#   pull (RFC #123). Requires max_concurrent_layer_downloads_per_image=1 in the initdata (serial
#   unpack — parallel unpack fails against the store; see manifests/registry/initdata.toml).
#   This retires the image-in-RAM brute-force: memory drops 160Gi -> 64Gi.
#
#   HF EGRESS: the CC guest resolves IPv6-first but has no v6 route (verified 2026-07-02) →
#   downloads would die with "Network is unreachable". Fix: /etc/gai.conf via ConfigMap
#   (glibc IPv4-first; covers huggingface.co AND its dynamic CDN hostnames).
#
# Prereqs: hf-token secret (model is gated); registry mirror running + seeded (manifests/registry/).
# Apply with initdata injected (NEVER hand-maintained):
#   B64=$(bash manifests/registry/build-initdata.sh)
#   sed "s|__INITDATA_B64__|$B64|" manifests/h100-vllm-cc.yaml | kubectl apply -f -
#
apiVersion: v1
kind: ConfigMap
metadata: { name: gai-ipv4-first }
data:
  gai.conf: |
    precedence ::ffff:0:0/96 100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cc
  labels: { app: vllm-cc }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: vllm-cc }
  template:
    metadata:
      labels: { app: vllm-cc }
      annotations:
        # Redirects in-guest image-rs to the local mirror (base64(gzip(initdata.toml))).
        io.katacontainers.config.hypervisor.cc_init_data: "__INITDATA_B64__"
    spec:
      runtimeClassName: kata-qemu-nvidia-gpu-snp   # confidential guest + CC GPU
      containers:
        - name: vllm
          # Same digest-pinned image as the smoke test — served by the local mirror.
          image: docker.io/vllm/vllm-openai@sha256:d5b12dfb74d605615f8b29ebafaa52294c118bcac7bc9e941785c4108fdb913a
          args:
            - "--model=mistralai/Mistral-Small-3.1-24B-Instruct-2503"
            - "--served-model-name=mistral-small-3.1"
            - "--quantization=fp8"
            - "--max-model-len=32768"
            - "--gpu-memory-utilization=0.90"
            - "--host=0.0.0.0"
            - "--port=8000"
          ports: [{ containerPort: 8000 }]
          env:
            - name: HF_TOKEN
              valueFrom: { secretKeyRef: { name: hf-token, key: token } }
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"                  # FA3 on sm_90
          resources:
            limits:
              nvidia.com/pgpu: 1
              # Image on /dev/trusted_store + weights on the encrypted emptyDir -> guest RAM
              # only needs runtime + load buffers (24B FP8 online-quantize included).
              memory: 64Gi
              cpu: "8"
            requests:
              memory: 32Gi
              cpu: "4"
          volumeMounts:
            # Weights cache → block-encrypted emptyDir (dm-crypt on host NVMe, guest key).
            - { name: models, mountPath: /root/.cache/huggingface }
            - { name: dshm, mountPath: /dev/shm }
            - { name: gai, mountPath: /etc/gai.conf, subPath: gai.conf }
          volumeDevices:
            # MAGIC path: kata-agent LUKS2-formats this in-guest and mounts it over
            # /run/kata-containers/image before guest-pull (image store off RAM).
            - { name: trusted-image, devicePath: /dev/trusted_store }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            # Guest-pull (~5.5 min via mirror) + ~50GB HF download + FP8 quantize + CUDA graphs.
            failureThreshold: 240
      volumes:
        - name: models
          emptyDir: {}                             # block-encrypted (emptydir_mode) — NOT medium:Memory
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
        - name: gai
          configMap: { name: gai-ipv4-first }
        - name: trusted-image
          persistentVolumeClaim: { claimName: trusted-image-24b }
---
apiVersion: v1
kind: Service
metadata: { name: vllm-cc-svc }
spec:
  selector: { app: vllm-cc }
  ports: [{ port: 8000, targetPort: 8000 }]
