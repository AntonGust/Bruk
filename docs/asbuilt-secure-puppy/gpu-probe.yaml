apiVersion: v1
kind: Pod
metadata:
  name: gpu-probe
  namespace: default
spec:
  runtimeClassName: kata-qemu-nvidia-gpu
  restartPolicy: Never
  containers:
  - name: probe
    image: rancher/mirrored-library-busybox:1.36.1
    command: ["sh", "-c", "echo gpu-probe-up; sleep 600"]
    resources:
      limits:
        nvidia.com/pgpu: 1
