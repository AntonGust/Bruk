# Supply-chain freshness for the Airon Operator (ADR-0008). Keeps Go modules and
# the SHA-pinned GitHub Actions current so pinning does not mean rotting.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /operator
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
