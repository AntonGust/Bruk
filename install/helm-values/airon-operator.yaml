# Airon Operator values (consumed by gitops/helm/operator.yaml — SUSPENDED).
# Image is pinned tag@digest (digest wins, tag stays readable) — printed by the
# operator-release workflow's job summary on tag operator/vX.Y.Z.
# ghcr.io/antongust/bruk-operator is PUBLIC (ADR-0008): the operator image is
# treated as public software (no secrets/config baked in, distroless + binary
# only, RBAC-controlled at runtime), so no imagePullSecret is needed. Workload
# and model secrets (hf-token) remain private.
controllerManager:
  container:
    image:
      repository: ghcr.io/antongust/bruk-operator
      # Pinned by digest (tag stays readable, digest is authoritative). From the
      # operator-release run for tag operator/v0.1.0 (2026-07-06).
      tag: "v0.1.0@sha256:2cf1b21a0175918ca41df2591c4c8784f2e0440efd2cfd68c00eaeb585301121"
