# This rule is not used by the project airon-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the bruk.airon.ai.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: airon-operator
    app.kubernetes.io/managed-by: kustomize
  name: brukmodel-editor-role
rules:
- apiGroups:
  - bruk.airon.ai
  resources:
  - brukmodels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - bruk.airon.ai
  resources:
  - brukmodels/status
  verbs:
  - get
