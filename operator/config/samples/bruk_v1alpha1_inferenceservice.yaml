# Reproduces manifests/h100-vllm-cc-smoke.yaml exactly (golden tests enforce it):
# Deployment vllm-cc-smoke + Service vllm-cc-smoke-svc.
# - engine.image omitted -> BrukTenant.spec.engine.defaultImage
# - weightsCache omitted -> no HF cache mount, no gai.conf, readiness threshold 120
apiVersion: bruk.airon.ai/v1alpha1
kind: InferenceService
metadata:
  labels:
    app.kubernetes.io/name: airon-operator
    app.kubernetes.io/managed-by: kustomize
  name: vllm-cc-smoke
spec:
  modelRef:
    name: qwen-0.5b
  engine:
    maxModelLen: 8192
    gpuMemoryUtilizationPercent: 30
  resources:
    gpus: 1
    memory:
      limit: 32Gi
      request: 16Gi
    cpu:
      limit: "8"
      request: "4"
  storage:
    trustedStore:
      existingClaim: trusted-image-smoke
