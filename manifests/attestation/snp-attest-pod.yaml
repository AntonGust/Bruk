# Bare SEV-SNP guest for PSP attestation verification (Day 5 / ADR-0004 steps 4-5).
# Same shape as the Day-2 snp-probe: privileged so we can mknod /dev/sev-guest.
# Usage: kubectl apply -f snp-attest-pod.yaml, then run verify-psp.sh (same directory).
apiVersion: v1
kind: Pod
metadata: { name: snp-attest, labels: { app: snp-attest } }
spec:
  runtimeClassName: kata-qemu-snp          # confidential guest, no GPU needed for PSP verify
  restartPolicy: Never
  containers:
    - name: attest
      image: busybox:1.36
      command: ["sleep", "7200"]
      securityContext: { privileged: true }   # unprivileged containers don't get /dev/sev-guest
      resources:
        limits:   { memory: 2Gi, cpu: "2" }
        requests: { memory: 2Gi, cpu: "1" }
