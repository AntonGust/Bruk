{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: bruktenants.bruk.airon.ai
spec:
  group: bruk.airon.ai
  names:
    categories:
    - bruk
    kind: BrukTenant
    listKind: BrukTenantList
    plural: bruktenants
    shortNames:
    - bt
    singular: bruktenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.infrastructure.nodeHostname
      name: Node
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BrukTenant is the Schema for the bruktenants API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of BrukTenant
            properties:
              confidential:
                description: confidential carries the confidential-computing configuration.
                properties:
                  initDataB64:
                    description: |-
                      initDataB64 is base64(gzip(initdata.toml)) — the value of the
                      io.katacontainers.config.hypervisor.cc_init_data pod annotation. In
                      tenant Git this field carries ${INITDATA_B64} and Flux
                      postBuild.substitute fills it (gitops/apps/cluster.yaml), the same
                      pipe the static manifests use today. Changing it rolls every CC pod
                      on the cluster.
                    minLength: 1
                    pattern: ^[A-Za-z0-9+/=]+$
                    type: string
                required:
                - initDataB64
                type: object
              displayName:
                description: displayName of the cluster/tenant.
                maxLength: 128
                type: string
              engine:
                description: engine carries cluster-wide engine defaults.
                properties:
                  defaultImage:
                    description: |-
                      defaultImage is the cluster default vLLM image, digest-pinned. MUST
                      stay in lockstep with the registry mirror seed
                      (manifests/registry/seed-job.yaml): the mirror only serves seeded
                      digests, so an unseeded digest cannot be pulled by CC guests.
                    pattern: ^[^@]+@sha256:[a-f0-9]{64}$
                    type: string
                required:
                - defaultImage
                type: object
              infrastructure:
                description: infrastructure describes the cluster's physical layout.
                properties:
                  nodeHostname:
                    description: |-
                      nodeHostname is the GPU node (one node per cluster today). Used only
                      for PV nodeAffinity when the operator creates localVolume PVs; pods
                      are pinned transitively via volume topology, exactly like the
                      hand-written manifests (no nodeSelector on Deployments).
                    minLength: 1
                    type: string
                  storageVolumeGroup:
                    default: bruk
                    description: |-
                      storageVolumeGroup is the LVM VG holding trusted-store logical
                      volumes (manifests/trusted-storage.yaml).
                    type: string
                required:
                - nodeHostname
                type: object
              tenantID:
                description: |-
                  tenantID is the fleet-plane identity (opaque). Optional until the
                  fleet plane exists.
                type: string
            required:
            - confidential
            - engine
            - infrastructure
            type: object
          status:
            description: status defines the observed state of BrukTenant
            properties:
              appliedInitDataHash:
                description: |-
                  appliedInitDataHash is the short sha256 of spec.confidential
                  .initDataB64 — lets humans correlate "why did my pods roll" across
                  InferenceService statuses.
                type: string
              conditions:
                description: 'conditions: Ready means the config validated.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: observedGeneration is the most recent generation reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: BrukTenant is a cluster-scoped singleton and must be named 'cluster'
          rule: self.metadata.name == 'cluster'
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
