# Bruk single-node vLLM serving (hardened from the Sprint 1 / Day 4 Checkpoint-4 spike)
#
# Serves an OpenAI-compatible endpoint from inside a Kata microVM with a whole
# RTX PRO 6000 Blackwell passed through via VFIO (Checkpoint 3 is the prerequisite).
#
# Hardened vs the original spike:
#   - model weights persist on a PVC (no ~90 GB re-download on restart)
#   - Deployment (self-heals) instead of a bare restartPolicy:Never Pod
#   - strategy: Recreate + RWO PVC so only one pod ever holds the GPU + weights
#
# Image pin: vllm/vllm-openai:v0.11.1 (matches the box's in-guest CUDA 13.1; public on
#   Docker Hub, no NGC pull secret). Do NOT use :latest — float = divergent bugs.
#
# Prereq secret (token kept out of any file — see docs/handoff-2026-06-23.md):
#   kubectl create secret generic hf-token --from-literal=token=$HF_TOKEN   # model is gated
#
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path          # k3s default; node-local NVMe (3.2 TB free)
  resources:
    requests:
      storage: 120Gi                    # ~90 GB pull for this repo (both weight formats) + headroom
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels: { app: vllm }
spec:
  replicas: 1
  strategy: { type: Recreate }          # RWO PVC + single GPU: never run two pods at once
  selector:
    matchLabels: { app: vllm }
  template:
    metadata:
      labels: { app: vllm }
    spec:
      runtimeClassName: kata-qemu-nvidia-gpu
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.11.1
          args:
            - "--model=mistralai/Mistral-Small-3.1-24B-Instruct-2503"
            - "--served-model-name=mistral-small-3.1"
            - "--quantization=fp8"
            # ~96 GB VRAM leaves huge KV-cache headroom for a 24B FP8 model (~24 GB weights).
            # 32768 is a generous, predictable default; Mistral-Small-3.1 supports up to 128k.
            - "--max-model-len=32768"
            - "--gpu-memory-utilization=0.90"
            - "--host=0.0.0.0"
            - "--port=8000"
          ports: [{ containerPort: 8000 }]
          env:
            - name: HF_TOKEN
              valueFrom: { secretKeyRef: { name: hf-token, key: token } }
            # Deliberate backend choice for dense FP8 on sm_120 (RTX PRO 6000) — see
            # docs/adr/0003-sm120-attention-backend.md. FLASH_ATTN keeps CUDA graphs +
            # paged attention here (verified); FlashInfer offers no win on sm_120 for a
            # dense model. This is an env var, not a serve CLI flag.
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"
          resources:
            limits:
              nvidia.com/pgpu: 1
              # Kata sizes the microVM from these limits. The Kata default (8Gi) is too
              # tight for a 24B load; give the guest room for the model load + CUDA context.
              memory: 32Gi
              cpu: "8"
            requests:
              memory: 32Gi
              cpu: "4"
          volumeMounts:
            # Persist the HF weight cache so a restart reuses ~90 GB instead of re-downloading.
            - { name: models, mountPath: /root/.cache/huggingface }
            # vLLM needs a sizeable /dev/shm; the Kata default is small.
            - { name: dshm, mountPath: /dev/shm }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 90          # first pull + weight load is slow (~minutes)
      volumes:
        - name: models
          persistentVolumeClaim: { claimName: vllm-models }
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
---
apiVersion: v1
kind: Service
metadata: { name: vllm-svc }
spec:
  selector: { app: vllm }
  ports: [{ port: 8000, targetPort: 8000 }]
