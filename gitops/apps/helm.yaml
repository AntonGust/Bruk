# Helm layer (Stage B): values ConfigMaps first, then the HelmReleases that consume them.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bruk-helm-values
  namespace: flux-system
spec:
  interval: 10m
  path: ./install/helm-values
  prune: true
  sourceRef:
    kind: GitRepository
    name: bruk
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bruk-helm
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/helm
  prune: true
  dependsOn:
    - name: bruk-helm-values
  sourceRef:
    kind: GitRepository
    name: bruk
