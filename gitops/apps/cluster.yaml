# Confidential app layer: trusted storage (block PVs/PVCs) + the two CC workloads.
# Reconciles manifests/ (explicit kustomization.yaml lists trusted-storage + the workloads).
#
# INITDATA_B64 = base64(gzip(manifests/registry/initdata.toml)) — the cc_init_data annotation
# value substituted into the workload manifests post-build. REGENERATE when initdata.toml
# changes:  bash manifests/registry/build-initdata.sh   → paste the output below.
# NOTE: changing this value rolls BOTH CC pods (the 24B re-downloads ~90GB weights, ~30 min).
#
# Out-of-band prereqs (deliberately NOT in Git): the hf-token secret (gated model) and the
# host-side LVM LVs (RUNBOOK §7 / install/host-setup.sh).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bruk-cluster
  namespace: flux-system
spec:
  interval: 10m
  path: ./manifests
  prune: true
  targetNamespace: default
  dependsOn:
    - name: bruk-registry
  sourceRef:
    kind: GitRepository
    name: bruk
  postBuild:
    substitute:
      INITDATA_B64: ""
