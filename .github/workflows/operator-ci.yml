# CI for the Airon Operator (operator/ subdir). Monorepo pattern: no workflow-level
# `paths:` filter — the `changes` job detects operator changes and every other job
# skips when untouched. Skipped required checks count as passing, so docs/gitops-only
# PRs are never blocked (see docs/plan Phase 3.2).
#
# Actions are pinned by commit SHA (supply-chain hardening, ADR-0008); Dependabot
# (.github/dependabot.yml) keeps the SHAs current. The trailing "# vN" is the
# human-readable tag the SHA corresponds to.
name: operator-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: operator-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      operator: ${{ steps.filter.outputs.operator }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            operator:
              - 'operator/**'
              - '.github/workflows/operator-*.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Lint
        working-directory: operator
        run: make lint

  # Fails if committed generated artifacts (CRDs, RBAC role, deepcopy, chart)
  # drift from the source markers — the RBAC-review gate: a widened
  # +kubebuilder:rbac marker that wasn't regenerated/committed breaks the build.
  generated:
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Regenerate and diff
        working-directory: operator
        run: |
          make manifests generate
          git diff --exit-code config/ dist/chart/ api/ || {
            echo "::error::Generated artifacts are stale — run 'make manifests generate' in operator/ and commit.";
            exit 1;
          }

  test:
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Cache envtest binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: operator/bin/k8s
          key: envtest-1.35.0-linux-amd64
      - name: Test with coverage gate (>= 80%)
        working-directory: operator
        run: make test-coverage
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: operator/cover.out
          if-no-files-found: ignore

  vulncheck:
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: govulncheck
        working-directory: operator
        run: make vulncheck

  e2e:
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum
      - name: Install kind
        run: |
          curl -sLo "$RUNNER_TEMP/kind" https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x "$RUNNER_TEMP/kind" && sudo mv "$RUNNER_TEMP/kind" /usr/local/bin/kind
      - name: Run kind e2e (installs via the Helm chart)
        working-directory: operator
        run: make test-e2e
      - name: Export kind logs on failure
        if: failure()
        run: kind export logs "$RUNNER_TEMP/kind-logs" --name airon-operator-test-e2e || true
      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kind-logs
          path: ${{ runner.temp }}/kind-logs
          if-no-files-found: ignore

  image:
    needs: [changes, lint, test]
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/antongust/bruk-operator
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
      - name: Build (push only on main)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: operator
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
