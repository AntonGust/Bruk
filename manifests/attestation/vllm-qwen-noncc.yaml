# Non-CC twin of h100-vllm-cc-smoke.yaml — SAME model/args/backend, non-confidential runtime.
# Purpose: apples-to-apples CC vs non-CC perf delta (ADR-0004 step 5 / Day 5).
# Prereq: node flipped non-CC (ccManager.defaultMode=off) — see RUNBOOK §2.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen-noncc
  labels: { app: vllm-qwen-noncc }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: vllm-qwen-noncc }
  template:
    metadata:
      labels: { app: vllm-qwen-noncc }
    spec:
      runtimeClassName: kata-qemu-nvidia-gpu   # non-CC; CC twin uses kata-qemu-nvidia-gpu-snp
      containers:
        - name: vllm
          # Same digest as the CC smoke pod so both sides run identical bits.
          image: docker.io/vllm/vllm-openai@sha256:d5b12dfb74d605615f8b29ebafaa52294c118bcac7bc9e941785c4108fdb913a
          args:
            - "--model=Qwen/Qwen2.5-0.5B-Instruct"
            - "--served-model-name=qwen-0.5b"
            - "--max-model-len=8192"
            - "--gpu-memory-utilization=0.30"
            - "--host=0.0.0.0"
            - "--port=8000"
          ports: [{ containerPort: 8000 }]
          env:
            - name: VLLM_ATTENTION_BACKEND
              value: "FLASH_ATTN"
          resources:
            limits:
              nvidia.com/pgpu: 1
              memory: 32Gi          # host-pulled image (virtiofs) — no guest-RAM tmpfs blowup here
              cpu: "8"
            requests:
              memory: 32Gi
              cpu: "4"
          volumeMounts:
            - { name: dshm, mountPath: /dev/shm }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 8Gi }
---
apiVersion: v1
kind: Service
metadata: { name: vllm-qwen-noncc-svc }
spec:
  selector: { app: vllm-qwen-noncc }
  ports: [{ port: 8000, targetPort: 8000 }]
