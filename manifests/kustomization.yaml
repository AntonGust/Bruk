# Flux entry point for the confidential app layer (gitops/apps/cluster.yaml points here).
# Explicit resource list — the other files in this directory are either legacy/non-CC
# (day4-vllm.yaml, h100-vllm.yaml), managed separately (registry/), or manual probes
# (attestation/). The workload manifests carry a ${INITDATA_B64} placeholder that the Flux
# Kustomization substitutes post-build (gitops/apps/cluster.yaml holds the blob).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - trusted-storage.yaml
  - h100-vllm-cc-smoke.yaml
  - h100-vllm-cc.yaml
