# The single-tenant cluster contract for the reference cluster (anton-bruk).
# In tenant Git, initDataB64 carries ${INITDATA_B64} and Flux postBuild.substitute
# fills it (gitops/apps/cluster.yaml). Here it is a syntactically valid placeholder
# (base64(gzip(comment))) so samples apply in kind/e2e, where kata never reads it.
# defaultImage MUST match the mirror seed digest (manifests/registry/seed-job.yaml) —
# enforced by internal/lockstep tests.
apiVersion: bruk.airon.ai/v1alpha1
kind: BrukTenant
metadata:
  labels:
    app.kubernetes.io/name: airon-operator
    app.kubernetes.io/managed-by: kustomize
  name: cluster
spec:
  displayName: "anton-bruk reference cluster"
  infrastructure:
    nodeHostname: anton-bruk
    storageVolumeGroup: bruk
  engine:
    defaultImage: docker.io/vllm/vllm-openai@sha256:d5b12dfb74d605615f8b29ebafaa52294c118bcac7bc9e941785c4108fdb913a
  confidential:
    initDataB64: H4sIAAAAAAAAA1NWKMhJTE7NyM9JSS1SyMzLLElJLElUSMsvUihOzC3ISS3WTzVKVXjUMEXBzz9EIVGhKDUxRyEpJz+JCwCpEyiVOwAAAA==
