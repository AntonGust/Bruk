{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.21.0
  name: brukmodels.bruk.airon.ai
spec:
  group: bruk.airon.ai
  names:
    categories:
    - bruk
    kind: BrukModel
    listKind: BrukModelList
    plural: brukmodels
    shortNames:
    - bm
    singular: brukmodel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.catalog.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.catalog.contextLength
      name: Context
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BrukModel is the Schema for the brukmodels API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of BrukModel
            properties:
              catalog:
                description: catalog is the OpenRouter-style metadata for this model.
                properties:
                  contextLength:
                    description: |-
                      contextLength is the model's NATIVE maximum context window (a catalog
                      fact). A deployment may serve a smaller window
                      (InferenceService.spec.engine.maxModelLen).
                    format: int32
                    minimum: 256
                    type: integer
                  description:
                    description: description of the model for the catalog.
                    maxLength: 2048
                    type: string
                  displayName:
                    description: displayName is the human-readable model name.
                    maxLength: 128
                    minLength: 1
                    type: string
                  features:
                    description: features the model supports.
                    items:
                      description: ModelFeature is an optional capability of a model.
                      enum:
                      - tool-calling
                      - structured-output
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  inputModalities:
                    description: inputModalities the model accepts.
                    items:
                      description: Modality is an input/output modality of a model.
                      enum:
                      - text
                      - image
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  license:
                    description: |-
                      license is the SPDX id, e.g. "Apache-2.0". The model library is
                      OSI-licensed only (CONTEXT.md).
                    maxLength: 64
                    type: string
                  outputModalities:
                    description: outputModalities the model produces.
                    items:
                      description: Modality is an input/output modality of a model.
                      enum:
                      - text
                      - image
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  pricing:
                    description: pricing metadata for the catalog.
                    properties:
                      completionPerMTokens:
                        description: completionPerMTokens is the price per 1M completion
                          tokens.
                        pattern: ^[0-9]+(\.[0-9]+)?$
                        type: string
                      currency:
                        default: EUR
                        description: currency of the prices.
                        enum:
                        - EUR
                        - USD
                        type: string
                      promptPerMTokens:
                        description: promptPerMTokens is the price per 1M prompt tokens.
                        pattern: ^[0-9]+(\.[0-9]+)?$
                        type: string
                    type: object
                required:
                - contextLength
                - displayName
                type: object
              servedName:
                description: |-
                  servedName is the public model id: rendered as --served-model-name and
                  later the OpenRouter-style catalog id. Defaults to metadata.name.
                maxLength: 63
                pattern: ^[a-z0-9]([a-z0-9._-]*[a-z0-9])?$
                type: string
              source:
                description: source says how the engine obtains the model.
                properties:
                  huggingFace:
                    description: huggingFace downloads the model from Hugging Face
                      at pod start.
                    properties:
                      repo:
                        description: |-
                          repo is the Hugging Face repository, e.g. "Qwen/Qwen2.5-0.5B-Instruct".
                          Rendered as --model=.
                        pattern: ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$
                        type: string
                      revision:
                        description: revision pins a Hugging Face commit for deterministic
                          weights.
                        type: string
                      tokenSecretRef:
                        description: |-
                          tokenSecretRef names the Secret holding the HF token for gated models
                          (delivered out-of-band, never in Git). Presence means "gated".
                        properties:
                          key:
                            default: token
                            description: key within the Secret.
                            type: string
                          name:
                            description: name of the Secret.
                            maxLength: 253
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - repo
                    type: object
                type: object
                x-kubernetes-validations:
                - message: a model source must be set (huggingFace)
                  rule: has(self.huggingFace)
            required:
            - catalog
            - source
            type: object
          status:
            description: status defines the observed state of BrukModel
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the BrukModel resource.
                  Ready means the spec validated and, if a token secret is referenced,
                  it exists.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: observedGeneration is the most recent generation reconciled.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
