# Release pipeline for the Airon Operator. Trigger: push a monorepo-namespaced
# tag `operator/vX.Y.Z`. Pushes ghcr.io/antongust/bruk-operator:vX.Y.Z and
# prints the image DIGEST to the job summary — that digest is what gets pinned
# in install/helm-values/airon-operator.yaml (deployment is always by digest).
name: operator-release

on:
  push:
    tags:
      - 'operator/v*'

permissions:
  contents: read

jobs:
  release-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#operator/}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: operator
          push: true
          tags: ghcr.io/antongust/bruk-operator:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Emit digest to job summary
        run: |
          {
            echo "## bruk-operator ${{ steps.version.outputs.version }}"
            echo ""
            echo "Image: \`ghcr.io/antongust/bruk-operator:${{ steps.version.outputs.version }}\`"
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Pin in install/helm-values/airon-operator.yaml as:"
            echo '```yaml'
            echo "controllerManager:"
            echo "  container:"
            echo "    image:"
            echo "      repository: ghcr.io/antongust/bruk-operator"
            echo "      tag: \"${{ steps.version.outputs.version }}@${{ steps.build.outputs.digest }}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
